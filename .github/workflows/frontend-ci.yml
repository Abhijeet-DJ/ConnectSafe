name: "FrontEndCI :: ConnectSafe - The chat App"
run-name: "Deployed by ${{ github.triggering_actor }}"

on:
    push:
        branches: ['main']
        paths:
            - "frontend/**"
            - "!frontend/**.md"
    pull_request:
        types: [opened, synchronize, ready_for_review]
        branches: ["main"]
        paths: 
            - "frontend/**"
            - "!frontend/**.md"
permissions:
    contents: read
    deployments: none
    pages: none
env: {}
concurrency: 
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true
jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        # (Optional) Setup your language environment here. 
        # Example using Node.js:
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '22'
            cache: 'npm'
            cache-dependency-path: './backend/package-lock.json'

        - name: Install dependencies
          run: npm ci

        - name: Run tests
          run: npm test

        - name: Build Frontend
          run: npm run build