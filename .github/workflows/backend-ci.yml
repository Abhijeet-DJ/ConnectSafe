name: "BackEndCI :: ConnectSafe - The chat App"
run-name: "Deployed by ${{ github.triggering_actor }}"
on:
    push:
        branches: ["main"]
        paths:
            - "backend/**"
            - "!backend/**.md"
    pull_request:
        types: [opened, synchronize, ready_for_review]
        branches: ["main"]
        paths: 
            - "backend/**"
            - "!backend/**.md"
permissions:
    contents: read
    deployments: none
env: {}
concurrency: 
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true
jobs: 
    test:
        name: "Pipeline Starting - Testing Initiated"
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./backend
        steps:
            - name: 'Checkout code'
              uses: 'actions/checkout@v4'
            
            - name: 'Setup Node Environment'
              uses: actions/setup-node@v4
              with: 
                node-version: '22'
                cache: 'npm'
                cache-dependency-path: './backend/package-lock.json'

            - name: 'Installing Dependencies'
              run: npm ci
            
            - name: 'Testing Backend'
              run: npm run test

    build:
        name: "Phase II - Building BackEnd"
        runs-on: ubuntu-latest
        needs: test
        defaults: 
            run:
                working-directory: ./backend
        steps:
            - name: 'checking linting errors'
              run: npm run lint

            - name: 'Processing safe build'
              run: nest build